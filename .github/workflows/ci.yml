name: ci

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts/*.sh (repo is early-stage; skip if none exist yet)
        run: |
          if ls scripts/*.sh >/dev/null 2>&1; then
            shellcheck scripts/*.sh
          else
            echo "No scripts/*.sh found yet — skipping shellcheck."
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests (repo is early-stage; skip gracefully if tests/ is absent or empty)
        run: |
          if [ -d tests ] && [ -n "$(ls -A tests 2>/dev/null)" ]; then
            if [ -f tests/test.sh ]; then
              bash tests/test.sh
            else
              node --test tests/
            fi
          else
            echo "No tests/ directory (or it is empty) yet — skipping."
          fi
